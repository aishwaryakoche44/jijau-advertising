<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />

    <!-- Best Mobile Responsive -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />

    <!-- Theme Color -->
    <meta name="theme-color" content="#000000" />

    <!-- SEO Description -->
    <meta
      name="description"
      content="Jijau Digital Advertising is a digital advertising agency that specializes in creating and managing online advertising campaigns for businesses of all sizes. We help our clients reach their target audience effectively."
    />

    <!-- Open Graph -->
    <meta property="og:title" content="Jijau Digital Advertising" />

    <meta
      property="og:description"
      content="Jijau Digital Advertising is a digital advertising agency that specializes in creating and managing online advertising campaigns for businesses of all sizes. We help our clients reach their target audience effectively."
    />

    <!-- Image inside public/img folder -->
    <meta property="og:image" content="%PUBLIC_URL%/img/logo192.png" />

    <meta property="og:url" content="/" />

    <meta property="og:type" content="website" />

    <meta property="og:site_name" content="Jijau Digital Advertising" />

    <meta property="og:image:width" content="500" />
    <meta property="og:image:height" content="500" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:title" content="Jijau Digital Advertising" />

    <meta
      name="twitter:description"
      content="Creative digital advertising solutions for business growth."
    />

    <meta name="twitter:image" content="%PUBLIC_URL%/img/logo192.png" />

    <!-- Apple -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/img/logo192.png" />

    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Title -->
    <title>Jijau Digital Advertising</title>

    <!-- Mobile Fix -->
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        overflow-x: hidden;
      }

      * {
        box-sizing: border-box;
      }

      img,
      video,
      iframe {
        max-width: 100%;
        height: auto;
      }

      #root {
        width: 100%;
        overflow-x: hidden;
      }
    </style>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <div id="root"></div>
  </body>
</html>
