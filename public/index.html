<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />

    <!-- Mobile Responsive -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />

    <!-- Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">

    <!-- Theme -->
    <meta name="theme-color" content="#000000" />

    <!-- SEO Description -->
    <meta
      name="description"
      content="Jijau Digital Advertising is a digital advertising agency that specializes in creating and managing online advertising campaigns for businesses of all sizes. We help our clients reach their target audience effectively."
    />

    <!-- Open Graph / WhatsApp Preview -->
    <meta property="og:title" content="Jijau Digital Advertising" />

    <meta
      property="og:description"
      content="Jijau Digital Advertising helps businesses grow online through creative digital marketing and advertising services."
    />

    <meta
      property="og:image"
      content="https://jijau-advertising-snowy.vercel.app/img/logo.png"
    />

    <meta
      property="og:url"
      content="https://jijau-advertising-snowy.vercel.app/"
    />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Jijau Digital Advertising" />

    <meta property="og:image:width" content="500" />
    <meta property="og:image:height" content="500" />

    <!-- Twitter Preview -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:title" content="Jijau Digital Advertising" />

    <meta
      name="twitter:description"
      content="Creative digital advertising solutions for business growth."
    />

    <meta
      name="twitter:image"
      content="https://jijau-advertising-snowy.vercel.app/img/logo.png"
    />

    <!-- Apple -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/favicon.ico" />

    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Title -->
    <title>Jijau Digital Advertising</title>

    <!-- Global Styles -->
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        overflow-x: hidden;
        font-family: 'Inter', sans-serif;
        background-color: #ffffff;
        color: #000000;
      }

      * {
        box-sizing: border-box;
        scroll-behavior: smooth;
      }

      h1, h2, h3, .font-display {
        font-family: 'Montserrat', sans-serif;
      }

      img,
      video,
      iframe {
        max-width: 100%;
        height: auto;
      }

      #root {
        width: 100%;
        overflow-x: hidden;
      }

      /* Premium Animation Definitions */
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes slideUp {
        from { 
          opacity: 0; 
          transform: translateY(30px); 
        }
        to { 
          opacity: 1; 
          transform: translateY(0); 
        }
      }

      .animate-fade-in {
        animation: fadeIn 1s ease-out forwards;
      }

      .animate-slide-up {
        animation: slideUp 0.8s ease-out forwards;
      }

      /* Custom Scrollbar for Luxury UI */
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: #d4a017;
        border-radius: 10px;
      }
    </style>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <div id="root"></div>
  </body>
</html>
